front:
  text: 序螽無一驗近今兩載當未全瘳每見各醫診脈雅不相符及翻閲名醫脈經始知叔和一書半屬高陽偽訣真偽莫分是以診視各異爰將各書纂為一册以便觀覽後有學者展卷焉而脈之理得已不必他求可也時乾隆十四年己巳六月上旬浣楓常朝宣書
  hash: sha256:6f14d943740e32558089560fa68278ed9ddce7346cbd75906da8240d28839900
  markers:
  - {type: 'tls:head', offset: 0, content: '', id: KR3eb031_jc_000-d2.h1s1}
body:
  text: 脈神通一子著脈者血氣之神邪正之鑑也有諸內必形諸外故血氣盛者脈必盛血氣衰者脈必衰無病者脈必正有病者脈必乖矧人之疾病無過表里寒熱虛實只此六字業已盡之六者之中又惟虛實二字為最要蓋凡以表症里症寒症熱症無不皆有虛實既知表裡寒熱而復能以虛實二字決之則千病萬病可以一貫矣且治病六法無逾攻補用攻用補無逾虛實欲察虛實無逾脈息雖脈有二十四名主病各異然一脈能兼諸病一病能兼諸脈其中隱微大有玄祕正以諸脈中亦有虛實之變耳言脈至此有神存矣倘不知要而泛焉求迹則毫釐千里必多迷誤故豫特表此義有如洪濤巨浪中則在乎牢執舵杆而病值危篤則在乎專辨虛實虛實得真則標本陰陽萬無一失其或脈有疑似又必兼症兼理以察其孰客孰主孰緩孰急能知本末先後是即神之至也矣十二經手太陽小腸手陽明大腸手少陽三焦手太陰肺手少陰心手厥陰心包絡足太陽膀胱足陽明胃足少陽膽足太陰脾足少陰腎足厥陰肝五臟正脈肝脈弦心脈鉤脾脈代肺脈毛腎脈石五臟平脈肝脈來弱弱招招如揭長竿末梢曰肝平乃弦長而兼和緩柔軟之象也心脈來纍纍如連珠如循琅玕曰心平脾脈來和柔相離如雞踐地曰脾平肺脈來厭厭聶聶如落榆莢曰肺平腎脈來喘喘纍纍如鉤按之而堅曰腎平五臟病脈肝脈來盈實而滑如循長竿曰肝病盈實而滑弦之太過也長竿無梢失和緩之意此弦多胃少故肝病心脈來喘喘連屬其中微曲曰心病至全曲鉤多胃少之象故心病脾脈來實而盈數如雞舉足曰脾病如雞舉足雖不能如踐地之和亦不至如鳥距之疾弱多胃少之象也肺脈來不上不下如循雞毛曰肺病不上不下澀之象也如循雞羽浮之象毛多胃少肺病將見也腎脈來如引葛按之益堅曰腎病引葛者牽引蔓之象也按之益堅則石多胃少腎病矣五臟死脈肝脈來急益徑如張新弓弦曰肝死如新張弓弦絶無胃脈也心脈來前曲後居如操帶鉤曰心死前曲者輕舉而堅大後居者重按而牢實也操帶鉤者狀其彈指之象但鉤無胃氣矣脾脈來鋭堅如鳥之啄如鳥之距如屋之漏如水之流曰脾死鳥啄者狀其硬鳥距者狀其急屋漏者亂也水流者散也胃氣全無脾死必矣肺脈來如物之浮如風吹毛曰肺死如物之浮則無根如風吹毛則散亂但毛無胃氣則肺絶矣腎脈來發如奪索辟辟如彈石曰腎死索而曰奪則互張而疾急石而曰彈堅徑而無倫矣但石無胃氣故腎死五臟真脈真脈即死脈也不見胃氣乃名真藏脈李士材云凡真藏脈見者肝至懸絶十八日死心至懸絶九日死肺至懸絶十二日死腎至懸絶七日死脾至懸絶四日死真肝脈至中外急如循刀刃責然如按琴瑟真心脈至堅而搏如循薏苡子纍纍然真脾脈至弱而乍數乍疏真肺脈至大而虛如毛羽中人膚真腎脈至搏而絶如彈石狀辟辟然衝陽衝陽者胃脈也一曰趺陽在足面大指間五寸骨間動脈是也凡病勢危篤當候衝陽以驗其胃氣之有無蓋土為萬物之母資生之本也故經曰衝陽脈絶死不治太溪太溪者腎脈也在足後踝後跟骨上陷中動脈是也凡病勢危篤當候太溪以驗其腎氣之有無蓋水為天一之元資始之本也故經曰太溪絶死不治太衝太衝者肝脈也在足大指本節後二寸經曰診病人太衝脈可以決生死同按難經曰上部有脈下部無脈其人當吐不吐者死此之謂也部位解左寸心部也其候在心與心包絡得南方君火之氣脾土受生肺金受制其主神明清濁右寸肺部也其候在肺與膻中得西方燥金之氣腎水受生肝木受制其主情思善惡景嶽曰上二部所謂上以候上也故凡頭面咽喉口齒頸項肩背之疾皆候於此左關肝部也其候在肝膽得東方風木之氣心火受生脾土受制其主官祿貴賤右關脾部也其候在脾胃得中央濕土之氣肺金受生腎水受制其主財帛厚薄景嶽曰上二部居中所謂候中焦也故凡於脅肋腹背之疾皆候於此左尺腎部也其候在腎與膀胱大腸得北方寒水之氣肝水受生心火受制其主陰氣之壽元右尺三焦部也其候在腎與三焦命門小腸得北方天一相火之氣脾土受生肺金受制其主陽氣之壽元景嶽曰上二部所謂下以候下也故凡於腰腹陰道及腳膝之疾皆候於此按右尺候三焦有駁之者云寸候上焦關候中焦尺候下焦命門候右尺亦有辨之者云命門在兩腎水火之間何先生亦主右尺候三焦與命門其説何也妙悟子附二十八脈出診家正眼浮脈浮在皮毛如水漂木舉之有餘按之不足浮脈為陽其病在表寸浮傷風頭痛鼻塞左關浮者風在中焦右關浮者風痰在膈尺部得之下焦風客小便不利大便閉澀無力表虛有力表實浮緊風寒景嶽云傷寒浮遲中風浮數風熱浮緩風濕景嶽云濕滯浮芤失血浮短氣病浮洪虛熱景嶽云狂躁蕭通隱云熱極又云浮洪而實熱傷經絡浮虛暑憊浮濡氣敗張景嶽曰雖浮為在表然真正風寒外感者脈反不浮但其緊數而略兼浮者便是表邪其症必發熱無汗或身有痠疼是其候也若浮而兼緩則非表邪矣大都浮而有力有神者為陽有餘陽有餘則火必隨之或痰見於中或氣壅於上可類推也若浮而無力空豁者為陰不足陰不足則水虧之候或血不營心或精不化氣中虛可知也以此等為表症則害莫大矣其有浮大弦硬之極甚至四倍以上者內經謂之關格此非有神之謂乃真陰虛極而陽亢無根大凶之兆也凡脈見何部當隨其部而察其症諸脈皆然蕭通隱曰至若浮芤失血浮革亡血內傷感冒而見虛浮無力癆瘵陰虛而見浮大兼疾火衰陽虛而見浮緩不鼓久病將傾而見渾渾革至浮大有力叔和亦云脈浮而無根者死然亦可以浮診而用治表之劑乎夫曰浮多主表症曰如浮悉屬內病表裡不明生死系之矣李瀕湖曰寸浮頭痛眩生風或有風痰聚在胸關上土衰兼木旺尺中溲便不流通按浮主在表舉世皆然殺人多矣因聞見不廣讀書不多若讀二先生論浮脈一條而引伸之則脈之全體大用無不明矣尚何有殺人之罪乎妙悟子沉脈沉行筋骨如水投石按之有餘舉之不足沉脈為陰其病在裡寸沉短氣胸痛引脅或為痰飲或水與血關主中寒因而痛結或為滿悶吞酸筋急尺主背痛亦主腰膝陰下濕癢淋濁痢泄無力裡虛有力裡實沉遲痼冷為精寒沉數內熱沉滑痰飲為宿食沉澀血結沉弱虛衰沉牢堅積沉緊冷痛沉緩寒濕沉伏霍亂張景嶽曰沉雖屬裡然必察其有力無力以辨虛實沉而實者多滯多氣故曰下手脈沉便知是氣氣停積滯者宜攻宜消沉而虛者因陽不達因氣不舒陽虛氣陷者宜溫宜補其有寒邪外感陽為陰蔽脈見沉緊而數及有頭痛身熱等症者正屬邪表不得以沉為里也蕭通隱曰沉而散沉而代沉而絶沉而短沉不鼓久病與陽病得此垂亡之候也若沉而芤沉而濡沉而澀沉而細沉而結主亡血傷精六極之脈諸如此類概不得以沉屬寒屬痛而混投溫散之劑也更有如沉之脈每見表邪初感之際風寒外束經絡壅盛脈必先見沉緊或伏或止是又不得以陽症陰脈為惑惟亟投以清表之劑與景嶽之説一也則應手汗泄而解矣此沉脈之疑似不可不辨也李瀕湖曰寸沉痰鬱水停胸關主中寒痛不通尺部濁遺並瀉痢腎虛腰及下元痌遲脈遲脈屬陰象為不及往來遲慢三至一息遲脈主藏其病為寒寸遲上寒心痛停凝關遲中寒癥結筋攣尺遲火衰溲便不禁或病腰足疝痛牽陰有力積冷無力虛寒浮遲表冷沉遲裡寒遲澀血少遲緩濕寒遲滑脹滿遲微難安張景嶽曰不及四至者是也乃陰盛陽虧之候為寒為虛浮而遲者內氣虛沉而遲者表氣虛遲在上則氣不化精遲在下則精不化氣氣寒則不行血寒則凝滯若遲兼滑大者多風痰頑痹之候遲兼細小者必真陽虧弱而然或陰寒留蓄於中則為泄為痛或元氣不榮於表則寒栗拘攣大都脈慢者總由元氣不充不可妄施攻擊蕭通隱曰遲與數為陰陽對待之體數六至遲三至息數甚懸而緩與遲又依稀相似但遲只三至緩得四至雖略相似主病則異至離經之脈則僅得二至內經謂之少氣然遲主藏病多屬寒浮遲表寒沉遲裡寒有力冷痛無力虛寒或主不月或見陰疝或血脈凝滯或癥瘕沉痼皆主陽虛陰盛之病也而獨有如遲之脈凡人傷寒初起未解遺熱未清經脈未充胃氣未復必脈見遲滑或見遲緩亦可投以溫中而益助餘邪乎此虛實之不容不辨也李瀕湖曰寸遲必是上焦寒關主中焦痛不堪尺屬腎虛腰腳重溲便不禁疝陰牽數脈數脈屬陽象為太過一息六至往來越度數脈主腑其病為熱寸數喘咳口瘡肺癰關數胃熱邪火上攻尺為相火遺濁淋癃有力實火無力虛火浮數表熱沉數里熱陽數君火陰數相火右數火亢左數陰戕張景嶽曰數脈有陰陽今後世相傳皆以數為熱脈及詳考內經則但曰諸急者多寒緩者多熱滑者陽氣盛微有熱曰粗大者陰不足陽有餘為熱中也曰緩而滑者曰熱中舍此之外則無以數言熱者而遲冷數熱之説乃始自難經云數則為熱遲則為寒今舉世所宗皆此説也不知數熱之説大有謬誤何以見之蓋自豫歷驗以來凡見內熱伏火等症脈反不數而惟洪滑有力如經文所言者是也至如數脈之辨大約有七此義失真以至相傳遺害者弗勝紀矣茲列其要者如下諸所未盡可以類推一外邪有數脈凡寒邪外感脈必暴見緊數然初感便數者原未傳經熱從何來所以只宜溫散即或傳經日久但見數而滑實方可言熱若數而無力者到底仍是陰症只須溫中此外感之數不可盡以為熱也若概用寒涼無不殺人一虛損有數脈凡患陽虛而數者脈必數而無力或兼細小而症見虛寒此則溫之且不暇尚堪作熱治乎又有陰虛之數者脈必數而弦滑雖有煩熱諸症亦宜慎用寒涼若但清火必至脾泄而敗同按今日庸醫治虛損多於清火殺人且凡患虛損者脈無不數數脈之病惟損最多愈虛則愈數愈數則愈危豈數皆熱病乎若以虛數作熱數則萬無不敗者矣一瘧疾有數脈凡瘧作之時脈必緊數瘧止之時脈必和緩豈作即有火而止則無火乎且火在人身無則無矣有則無止時也能作能止者惟寒邪之進退耳真火真熱則不然也此瘧疾之數故不可盡以為熱一痢疾有數脈凡痢疾之作率由寒濕內傷脾腎俱損所以脈數但兼弦澀細弱者總皆虛數非熱數也悉宜溫補命門百不失一其有形症多火年力強壯者方可以熱數論治然必見洪滑實數之脈方是其症一癰瘍有數脈凡脈數身無熱而反惡寒飲食如常者或身有熱而得汗不解者即癰疽之候也然瘡瘍之發有陰有陽可攻可補亦不得盡以脈數者為熱症一痘疹有數脈以邪毒未達也達則不數矣此當以虛實大小分陰陽亦不得以數為熱脈一癥癖有數脈凡脅腹之下有塊如盤者以積滯不行脈必見數若積久成疳陽明壅滯而致口臭牙疳發熱等症者乃宜清胃清火如無火症而脈見細數者亦不得認以為熱一胎孕有數脈以衝任氣阻所以脈數本非火也此當以強弱分寒熱不可因其脈數而執以黃芩為聖藥按以上數脈諸症凡邪盛者多數脈虛甚者尤多數脈則是熱非熱從可知矣蕭通隱曰數脈息數輻輳按舉有力主陽盛燔灼侵剝真陰之實病浮為在表沉為在裡發表攻裡脈症相符不難分別惟是如數之脈疑似真假之間便有生死霄壤之殊人多不知夫數按不鼓即為虛寒相搏之脈數大而虛則為精血銷竭之脈細疾若數陰燥似陽之候也沉弦細數虛癆垂死之期也又有快脈即急脈快急即如數脈非真數也若假熱之病誤服涼劑脈亦數也每見舉世醫流診得息數急疾竟不知新病久病有力無力鼓與不鼓之異一概混投苦寒遽絶胃氣安得不速人於死乎徐東皋云數候多凶勻健略可惟宜傷寒妊瘧小兒瀕湖脈學云數脈為陽熱可知只將君相火來醫實宜涼瀉虛溫補肺病秋深卻畏之據此亦嘗有溫補之者矣若僅言只將君相火來醫則猶見之未擴也夫獨不有陽虛陰盛之重恙反得洪數有力之實脈急溫桂附旋即痊可者乎余謹再引內經色脈篇論以正其謬以救其在為時師下一痛針法經言冬脈曰其氣來如彈石者此為太過病在外其去如數者此為不及病在中釋云來如彈石者其至堅強營之太過也去如數者動止疾促營之不及也蓋數本屬熱而此真陰虧損之脈亦必急數然愈數則愈虛愈虛則愈數而非陽強實熱之數故不曰數而曰如數則辨析之意深矣此而一差生死反掌愚以為豈獨數脈有相似者即浮沉遲緩滑澀虛實弦緊諸脈亦皆有相似者又非唯脈然也至症若如瘧如痰如喘如風如淋等症設非素嫺審辨臨事最撼心目故庸淺者只知現在精妙者疑似獨明為醫之難此關頭矣按數脈一症不明於世久矣余曾見癆瘵垂危脈數而用三黃潮熱不解咳嗽失血脈數而用參蘇飲者率以數脈為熱為實誤人不淺豫每遇此等脈候輒用貞元飲或六味回陽等方而退欲行此道者當以二先生數脈之辨而玩味焉庶免殺人之禍妙悟子識滑脈滑脈替替往來流利盤珠之形荷露之義滑脈為陽多主痰液寸滑咳嗽胸滿吐逆關滑胃熱壅氣傷食尺滑病淋或為痢積男子溺血婦人經郁浮滑風痰沉滑痰食滑數痰火滑短氣塞滑而浮大尿則陰痛滑而浮散中風癱緩滑而沖和娠孕可喜張景嶽曰往來流利如盤走珠乃氣實血壅之候為痰逆為食滯為嘔吐為滿悶滑大滑數為內熱上為心肺頭目咽喉之熱下為小腸膀胱二便之熱婦人脈滑數而經斷者為有孕平人脈滑而和緩此營衛充實之佳兆若過於滑大則為邪熱之病又凡病虛損者多有弦滑之脈此陰虛然也瀉痢者亦多弦滑之脈此脾腎受傷也不得通以火論蕭通隱曰滑脈平勻乃得胃氣之脈也故經云脈弱以滑是有胃氣又云滑者陽氣盛微有熱按之指下鼓擊有力有神如珠圓滑替替不絶男得此無病女得此有胎此真滑脈也若病則屬痰飲浮滑風痰沉滑食痰滑數痰火滑短宿食寸滑嘔吐關滑蓄血尺滑頽淋遺泄亦脈症相應之脈也而特有如滑之脈驟診亦得平和不大不小不見歇至不見克勝息數如常只是平動不鼓牒牒而去稍按即無此為元氣已脫僅存餘氣留連藏府經脈之中未盡斷耳先於死期旬日內便見此脈乃絶脈也雖有盧扁亦難復蘇每見醫者尚於此際執以為痰化氣消痞攻劑任投只速其亡耳抑何昧於生死之頓殊乎李瀕湖曰寸滑膈痰嘔吐生吞酸咳嗽舌強臨當關宿食兼寒熱渴痢癲淋向尺評澀脈澀脈蹇滯如刀刮竹遲細而短三象俱足澀為血少亦主精傷寸澀心痛或為怔忡關澀陰虛因而中熱右關土虛左關脅脹尺澀遺淋血痢可決孕而胎病無孕血竭澀而堅大為有實熱澀而虛軟虛火炎灼張景嶽曰為血氣俱虛之候為少氣為憂煩為痹痛為拘攣為麻木為無汗為脾寒少食為胃寒多嘔為二便違和為四肢厥冷男子為傷精女子為失血為不孕為經脈不調凡脈見澀滯者多由七情不遂營衛耗傷血無以充氣無以暢其在上則有上焦之不舒參伍不調傷精亡血之病為血痹為寒濕入營為心痛為脅痛為解㑊為反胃為亡陽為腸結為不月為胎病為溲淋亦為氣滯經曰脈弱以澀是謂久病然亦有不同者或人賦稟經脈不利或七情傷懷莫解或過服補劑以致血氣壅盛或飲食過度不即運化或痰多而見獨澀或久臥久坐體拘不運此又非專主於傷精亡血之病也至於虛癆細數而澀或兼結代死期可十凡診此脈須察病機庶無謬治李瀕湖曰寸澀心虛痛對胸胃虛脅脹察關中尺為精血俱傷候腸結溲淋或下紅虛脈虛合四形浮大遲軟及乎尋按幾不可見虛主血虛又主傷暑左寸心虧驚悸怔忡右寸肺虛自汗氣怯左關肝傷血不營筋右關脾寒食不消化左尺水衰腰膝痿痹右尺火衰寒症蜂起張景嶽曰虛脈正氣虛也無力也無神也有陰有陽浮而無力為血虛沉而無力為氣虛數而無力為陰虛遲而無力為陽虛虛雖曰微濡遲澀之屬皆為虛類然而無論諸脈但見指下無神者總是虛脈內經曰按之不鼓諸脈皆然即此謂也故凡洪大無神者即陰虛也細小無神者即陽虛也陰虛則金水虧殘龍雷易熾而五液神魂之病生焉或盜汗遺精或上下失血或驚忡不寧或咳喘勞熱陽虛則火土受傷真氣日損而君相化源之病生焉或頭目昏眩或膈塞脹滿或嘔惡亡陽或瀉痢疼痛救陰者壯水之主救陽者益火之源漸長則生漸消則死虛而不補元氣將何以復此實死生之關也醫不識此尚望其他焉李瀕湖曰血不營心寸口虛關中腹脹食難舒骨蒸痿痹傷精血卻在神門神門者尺脈也兩部居實脈實脈有力長大而堅應指愊愊三候皆然血實脈實火熱壅結左寸心勞舌強氣壅右寸肺病嘔逆咽痛左關見實肝火脅痛右關見實中滿氣疼左尺見之便閉腹疼右尺見之相火亢逆實而且緊寒積稽留實而且滑痰凝為祟張景嶽曰實脈邪氣實也舉按皆強鼓動有力實脈有陰有陽凡弦洪滑緊之屬皆相類也為三焦壅滯之候表邪實者浮大有力以風寒暑濕外感於經為傷寒瘴瘧為發熱頭痛鼻塞頭腫為筋骨肢體痠疼癰毒等症里邪實者沉實有力因飲食七情內傷於藏為脹滿為閉結為癥瘕為瘀血為痰飲為腹痛為喘嘔咳逆等症火邪實者洪滑有力為諸實熱等症寒邪實者沉弦有力為諸痛實等症凡其在氣在血脈有兼見者當以類求然實脈有真假真實者易知假實者易誤故必問其所因而兼察形症必得其神方是高手蕭通隱曰實脈浮沉皆得大而且長應指不虛經云血實脈實曰脈實者水穀為病曰氣來實強是謂太過蓋實主火熱有餘之病或發狂譫語或陽毒便結或咽腫舌強或脾熱中滿或腰腸壅痛或平人實大主有痢疾宜先下之或瘡疽脈實急下之以邪氣在裡故也俱宜通腸發汗亟解繁苛之火不待再計矣又有如實之脈久病得此孤陽外脫脈必先見弦數滑實故書云久病脈實者凶其可療以消伐之劑乎更有沉寒內痼脈道壅滯而堅牢如實此又不得概用寒劑但溫以薑桂之屬可也又有真陰大虧燎原日熾脈見關格洪弦若實法幾窮矣尚可清涼乎以上三症皆如實脈非正實脈也李瀕湖曰寸實應知面熱風咽疼舌硬氣填胸當關脾熱中宮滿尺屬腰腸痛不通長脈長脈迢迢首尾俱端直上直下如循長竿長脈有餘氣逆火盛左寸見長君火為病右寸見長滿逆為定左關見長木實之殃右關見長土鬱脹悶左尺見之奔豚沖競右尺見之相火專令蕭通隱曰長脈不大不小迢迢自若如循長竿末梢為平如引繩如循長竿為病長有三部之長一部之長心脈長神強氣壯腎脈長蒂固根深經云長則氣治短則氣病長主於肝短主於肺皆平脈也反此則為有餘之病非陽毒癲癇則陽明熱深若長而緩者百病皆愈大概雖主乎病亦屬輕淺之症其有如長之脈或鰥寡思色不遂心肝兩部則洪長而溢魚際是皆七情為患而非有病之脈也或㿗疝而左尺偏長是又宿疾留經而非無病之脈也或寒入經腑六部細長不鼓此非投以辛熱不能蠲除也若細長而鼓又須清解靈變在人耳看得長脈多有兼見不得偏執為悉無病但病得此終非死脈老人兩尺脈沉長滑實壽可期頤且徵瓜瓞之盛若短脈不及本位應指而回不能滿部主病為內虛為喘滿氣促為胃氣弱為頭腹疼諸病見短難治為真氣不足是又與長為霄壤之判李瀕湖曰長脈迢迢小大勻反常為病似牽繩若非陽毒癲癇病即是陽明熱勢深短脈短脈澀小首尾俱俯中間突起不能滿部短主不及為氣虛症短居左寸神心不定短見右寸肺虛頭痛短在左關肝氣受傷短在右關膈間為殃左尺短時少腹必疼右尺短時真火不隆李瀕湖曰短脈非於尺寸尋不數不硬不滑真浮為血澀沉為痞寸主頭疼尺腹疼洪脈洪脈極大狀如洪水來盛去衰滔滔滿指洪為盛滿氣壅火亢左寸洪大心煩舌破右寸洪大心滿氣逆左關見洪肝木太過右關見洪脾土脹熱左尺洪兮水枯便難右尺洪兮龍雷燔灼張景嶽曰洪脈大而實也舉按皆有餘洪脈為陽凡浮芤實大之屬皆其類也為血氣燔灼大熱之候浮洪為表熱沉洪為裡熱為脹滿為煩渴為狂躁為斑疹為頭疼面熱為咽乾喉痛為口瘡癰腫為大小便不通為動血此陽實陰虛氣實血虛之候洪大至極甚至四倍以上者即是陰陽離絶關格之脈也不可治蕭通隱曰洪脈指下極大來盛去衰來大去長體為陽藏司心時屬夏運主火也為陽盛陰虛之病若逢炎夏診有胃氣乃應時之脈也若泄痢失血久嗽及痞滿反胃見之增劇難瘥或沉兼洪弦澀主痰紅火熾之症若形瘦脈大多氣虛死又曰脈大則病進若春秋冬月見之治主升陽散火若洪而有力乃實脈非洪脈須投寒涼此皆相類宜細別耳又有如洪之脈乃陰虛假熱陽虛暴症脈雖洪大按而無力此又不得投以涼劑致敗胃氣又人臨死從陽散而絶者脈必先見洪大滑盛乃真氣盡脫於外也不可不察李瀕湖曰寸洪虛火上焦炎肺脈洪時金不堪肝火胃虛關內察腎虛陰火尺中看按夏脈洪大而散曰平反得腎則水剋火為賊邪難治得脾則子扶母為實邪得肝則母歸子為虛邪得肺則金凌火為微邪俱易治凡翻胃下痢久嗽形瘦之人俱忌洪脈微脈微脈極細而又極軟似有若無欲絶非絶微脈模糊氣血大衰左寸驚怯右寸氣促左關寒攣右關胃冷左尺得微髓絶精枯右尺得微陽衰命絶張景嶽曰微脈纖細無神柔弱之極是為陰脈凡細小虛濡之屬皆其類也乃血氣俱虛之候為畏寒為恐懼為怯弱為少氣為中寒為脹滿為嘔噦為泄瀉為虛汗為食不化為腰腹疼痛為傷精失血為眩運厥逆此雖氣血俱虛而尤為元陽虧損最是陰寒之候李瀕湖曰寸微氣促或心驚關脈微兮脹滿形尺部見之精血竭惡寒發熱汗漓淋按微者陽氣衰而陰氣絶也久病得之不可治以正氣將滅也卒病得之或可生以邪氣尚未深重也陽微惡寒陰微發熱男為勞極諸虛女為崩中帶下之症細脈細直而軟纍纍縈縈狀如絲線較顯於微細主氣衰諸虛勞損細居左寸怔忡不寐細在右寸嘔吐氣怯細入左關肝陰枯竭細入右關胃虛脹滿左尺若細泄痢遺精右尺若細下元冷憊蕭通隱曰細脈似微而常有細直而軟若絲線之應指宜於秋冬老弱為血氣兩衰之病或傷精泄汗或濕氣下侵或泄痢脫陰或丹田虛冷或胃虛腹脹或目眩筋痿脈經云細為血少氣衰有此症則順否則逆故吐衄脈沉細者生憂勞過度者脈亦細治須溫補至有如細之脈或因暴受寒冷痛極壅塞經絡致血沉細不得宣達是細不得概言虛而可誤施滋補固結邪氣也又有癆怯困殆脈見弦細而數蓋弦主氣衰細主血少數主虛火煎熬奄奄待斃醫於此尚欲清之平之良可慨矣李瀕湖曰寸細應知嘔吐頻入關腹脹胃虛形尺逢定是丹田冷瀉痢遺精號脫陰濡脈濡脈細軟見於浮分舉之乃見按之即空濡主陰虛髓絶精傷左寸見濡健忘驚悸右寸見濡騰虛自汗左關逢之血不營筋右關逢之脾虛濕侵左尺得濡精枯血損右尺逢之火敗命乖李瀕湖曰寸濡陽微自汗多關中其賴氣虛何尺傷精血虛寒甚溫補真陰可起疴弱脈弱脈細小見於沉分舉之則無按之乃得弱為陽陷真陰衰弱左寸心虛驚悸健忘右寸肺虛自汗短氣左關木虛必苦攣急右關土寒水穀之疴左尺弱形涸流可徵右尺若見陽陷可驗蕭通隱曰濡弱微細四種相類濡脈極軟如水面浮綿輕診則得重按無有弱脈極軟重按乃得輕診無有脈學云浮細如綿曰濡沉細如綿曰弱浮而極細如絶曰微沉而極細不斷曰細又云輕診即見重按如欲絶者微也往來如線而常有者細也仲景曰脈瞥瞥如羹上肥者陽氣微縈縈如蠶絲細者陽氣衰此四脈者雖形體不一大較皆陰陽兩虧病從內得或失精亡血或泄汗傷濕或氣促心驚或虛脹消疸或筋骨痿痹老弱久病見之順少年春夏見之逆治法皆宜調營益氣填精實髓固脾健胃急施拯救方得全生凡診此脈須察胃氣多少頂卜吉凶李瀕湖曰弱脈從來是氣虛弱堪重按血猶流若兼澀象氣交敗老病能調少壯憂緊脈緊脈有力左右彈人如絞轉索如切緊繩緊主寒邪亦主諸痛左寸逢緊心滿急痛右寸逢緊傷寒喘嗽左關人迎浮緊傷寒右關氣口沉緊傷食左尺見之臍下痛極右尺見之奔豚疝疾急而緊者是為遁尸數而緊者當主鬼擊張景嶽曰急疾有力堅搏抗指有轉索之狀凡弦數之屬皆相類也緊脈陰多陽少乃陰邪激搏之候主為痛為寒緊數在表為傷寒發熱為渾身筋骨疼痛為頭痛項強為咳嗽鼻塞為瘴為瘧沉緊在裡為心脅疼痛為胸腹脹滿為中寒逆冷為吐逆出食為風癇反張為痃癖為瀉痢為陰疝在婦人為氣逆經滯在小兒為驚風抽搐蕭通隱曰緊脈形如轉索無常又如切繩乃熱為寒束之脈故似急數而不甚鼓暴病見之為腹痛身疼寒客太陽或主風痙癇症在尺陰冷脈疝在關心腹沉痛在左緊盛傷寒在右緊盛傷食若中惡浮緊咳嗽沉緊皆主死此脈與症反也又有如緊之脈乃傷寒陰症絶陽七日九日之間得此脈仲景云脈見轉索者即日死蓋緊屬病脈非死脈但以新久之異便有生死之分不可不察李瀕湖曰寸以人迎氣口分當關心腹痛沉沉尺中見緊為陰冷定是奔豚與疝疼按凡中惡鬼祟之病而得浮緊為邪方熾而脈無根咳嗽虛實之症而得沉緊為正已虛而邪已痼也均在不治之例緩脈緩脈四至寬舒和勻微風輕颭楊柳初春緩為胃氣不主於病取其兼見方可斷症浮緩風傷沉緩寒濕緩大風虛緩細濕痹緩澀脾薄緩弱氣虛左寸緩浮風邪所居右寸緩澀少陰血虛左關緩浮肝風內鼓右關緩沉土弱濕侵左尺緩澀精宮不反右尺緩細真陽極衰張景嶽曰緩脈和緩不緊也緩脈有陰有陽其義有三凡從容和緩浮沉得中者此自平人之正脈若緩而滑大者多實熱如內經所言者是也緩而遲細者多虛寒即諸家所言者是也然實熱者必緩大有力多為煩熱為口臭為腹滿為癰瘍為二便不利或傷寒溫瘧初愈而餘熱未清者多有此脈若虛寒者必緩而遲細為陽虛為畏寒為氣怯為疼痛為眩暈為痹弱為痿厥為怔忡健忘為飲食不化為驚溏飧泄為精寒腎冷為小便頻數女人為經遲血少為失血下血凡諸瘡毒外症及中風産後但得脈緩者皆易愈蕭通隱曰緩為脾脈主乎中應乎肌肉陽寸陰尺上下同等不浮不沉不大不小不疾不徐不微不弱和緩有力鼓指有神如絲在經不卷其軸又如微風輕颭柳梢蔡西山曰意思欣欣難以名狀四時五藏得此為有胃氣其體屬地天之交陽中有陰陰中有陽藏司脾時應長夏主季土也不分男女老弱心身得此志暢神和百病得此不治自愈然緩有二此有胃氣雍容和緩之緩也又緩弛之緩緩縱之緩緩弱之緩緩弛者傷濕也緩縱者風熱也緩弱者氣虛也緩而兼澀者血虛也浮緩者風傷經絡沉緩者濕傷藏府洪緩濕熱細緩寒濕是皆有病之脈而非緩脈也尚有陰虛浮洪無力而緩陽虛沉細無力而緩是僅肖緩之體而非得緩之神也若弦居土位緩臨水宮蓋克脈也看此緩脈要察胃氣多少鼓擊高下來去遲速便得真確悟從心解未可一診了事也李瀕湖曰寸緩風邪項背拘肝風內鼓胃家虛神門泄濡或風祕或是蹣跚足力迂弦脈弦如琴絃輕虛而滑端直以長指下挺然弦為肝風主痛主瘧主痰主飲弦在左寸心中必痛弦在右寸胸及頭疼左關弦兮痰瘧癥瘕右關弦兮胃寒膈痛左尺逢弦飲在下焦右尺逢弦足攣疝痛浮弦支飲沉弦懸飲弦數多熱弦遲多寒弦大主虛弦細拘急陽弦頭痛陰弦腹痛單絃飲癖雙弦寒痼張景嶽曰弦脈按之不移硬如弓弦凡滑大堅搏之屬皆其類也為陽中伏陰為血氣不和為氣逆為邪勝為肝強為脾弱為寒熱為痰飲為宿食為積聚為脹滿為虛勞為疼痛為拘急為瘧痢為疝痹為胸脅痛瘡疽論曰弦洪相搏外緊內熱欲發瘡疽也弦從木化氣通乎肝可以陰亦可以陽但其弦大兼滑者便是陽邪弦緊兼細者便是陰邪凡藏腑間胃氣所及則五藏俱安肝邪所侵則五藏俱病何也蓋木之滋生在水培養在土若木氣過強則水因食耗土為克傷水耗則腎傷土虧則胃損凡久病而見弦脈所以難治腎為精血之本胃為水穀之本根本受傷生氣敗矣所以木不宜強也矧人無胃氣曰死故脈見和緩者吉指下弦強者凶蓋肝邪與胃氣不和緩與弦強相左弦甚者土必敗諸症見此總非佳兆蕭通隱曰弦脈其狀端直以長若箏弦從中直過挺然指下體為陽中陰藏司肝時屬春運主木也經云輕虛以滑者平實滑如循長竿者病徑急如新張弓弦者死戴同父曰弦而軟者其病輕弦而硬者其病重純弦為負死脈也弦緩平脈也弦臨土位克脈也弦見於秋反克脈也木來侮金春病無弦失主脈也其病主諸瘧動脈動無頭尾其動如豆厥厥動搖必兼滑數動脈主痛亦主於驚左寸得動驚悸可斷右寸得動自汗無疑左關若動驚及拘攣右關若動心脾疼痛左尺見之亡精為病右尺見之龍火奮迅蕭通隱曰動乃數脈見於關上下無頭尾如豆大忽忽動搖仲景曰陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒此三焦傷也主病為痛為驚為泄痢為亡精為失血虛者傾搖勝者自安此皆病脈也又有平人而動者太素云三部寬長是上賢更於膽脈帶長弦豁然應指如龍動翊贊明君萬萬年又云腎部忽然動滑時為官必定有遷移更看三部寬洪應用意消詳仔細推素問曰婦人手少陰脈動甚者孕子也是皆吉兆之脈也李瀕湖曰動脈專司痛與驚汗因陽動熱因陰或為泄痢拘攣病男子亡精女子崩按凡兩手寸脈動為陽動動則虛虛則汗出蓋汗為心之液而肺主皮毛也兩手尺脈動為陰動動則虛虛則發熱蓋腎水不足相火虛炎也促脈促為急促數時一止如趨而蹶進則必死促因火亢亦因物停左寸見促心火炎炎右寸見促肺鳴咯咯促見左關血滯為殃促居右關脾宮食滯左尺逢之遺滑堪憂右尺見之灼熱為定蕭通隱曰促脈乃數而一止此為陽極亡陰主痰壅陽經積留胃府或主三焦鬱火炎盛或發狂斑或生毒疽五積停中脈因為沮最不宜於病後為氣血不接續若勢進不已則為可危五積者血氣痰飲食也若此得之新病元氣未敗不必深慮但有如促之脈或漸見於虛癆垂危之頃死期可卜或暴作於驚遑造次之候氣復自愈脫陰見促終非佳兆腫脹見促不交之否促脈則亦有死者矣李瀕湖曰促脈惟將火病醫其用有五氣血痰飲食五者細推之時時喘咳皆痰疒災或發狂斑與毒疽結脈結為凝結緩時一止作行而怠頗得其旨結屬陰寒亦因凝積左寸心寒疼痛可決右寸肺虛氣寒凝結左關結見疝瘕必見右關結形痰滯食停左尺結兮痿躄之疴右尺結兮陰寒之楚張景嶽曰結脈脈來忽止止而復起總謂之結舊以數來一止為促促者為熱為陽極緩來一止為結結者為寒為陰極通謂其為氣為血為食為痰為積聚為癥瘕為七情鬱結浮結為寒邪在經沉結為積聚在內此固結促之舊説矣然以豫之驗則促類數也未必熱結類緩也未必寒但見中止者總是結脈更上一層樓精切之至多由血氣漸衰精力不繼所以斷而復續續而復斷常見久病者多有之虛勞者多有之或誤用攻擊消伐者亦有之但緩而結者為陽虛數而結者為陰虛緩者猶可數者更劇此可以結之微甚察元氣之消長最顯最切者也至如留滯鬱結等病本亦此脈之證應然必其形強氣實而舉按有力此多因鬱滯者也有無病而一生脈結者此其素稟之異常無足怪也舍此之外凡病有不退而漸見脈結者此必氣血衰殘首尾不繼之候速宜培本不得妄認為留滯蕭通隱曰結脈緩而一止止無常數代脈動而中止不能自還因而復動止有常數脈學云數而時止名為促緩上須將結脈呼止不能還方是代結生代死自殊途然代為氣衰固云死脈而又宜於風家痛極孕婦霍亂是代亦有生者至結脈雖云陰凝痰結積聚癰腫瘕疝諸病每見脫血逢此終不免於死者是又不拘於常數總之結脈多生代脈多死耳瀕湖曰脈一息五至肺心脾肝腎五藏之氣皆足五十動而一息合大衍之數謂之平脈反此則止乃見焉腎氣不能至則四十動一息肝氣不能至則三十動一息蓋一藏之氣衰而代藏之氣代至也滑伯仁曰若無病羸瘦而脈代者危脈也有病而氣血乍損氣不能續者只為病脈傷寒心悸脈代者復脈湯主之妊娠脈代者其胎百日代脈之生死不可不辨而結代之所以不同李瀕湖曰結脈皆因氣血凝老痰結滯苦成吟內傷血氣外癰腫疝瘕為殃病屬陰代脈代為代禪止有常數不能自還良久復動代主藏衰危惡之候脾土敗壞吐痢為咎中寒不食腹疼難救兩動一止三四日死四動一止六七日死次第推求不失經旨蕭通隱曰代脈有二代為氣衰固止有常數此死脈也經又云黃脈代此蓋指脾脈而應於四時遇春得胃氣而兼見微弦遇夏得胃氣而兼見微洪遇秋得胃氣而兼見微浮遇冬得胃氣而兼見微石此乃四時更代之代而非死脈之代此代之義又不可不知李瀕湖曰代脈原因藏氣違腹痛泄痢下元虧或為吐泄中宮滿女子懷胎三月期革脈革大弦急浮取即得按之乃空渾如鼓革革主表寒亦屬中虛左寸之革心血虛痛右寸之革金衰氣壅左關遇之疝瘕為祟右關遇之主虛為痛左尺診革精空可必右尺診革殞命為憂女人得之半産漏下蕭通隱曰革牢不同革脈如按鼓皮主病為亡血遺精半産崩漏脹滿中風感濕諸症牢脈似沉似伏大而長微弦扁鵲曰牢而長者肝也仲景曰寒則堅牢有牢固之象徐東皋云沉而有力動而不移牢之體也主病為心腹疼痛疝瘕為氣短息促為皮膚著腫是牢革二脈固判若天淵也仲景曰弦則為寒芤則為虛虛寒相搏此名曰革男子主亡精失血女人主半産漏下脈經曰三部脈革長病得之死卒病得之生瀕湖曰此即芤弦二脈相合故均主失血之候諸家脈書皆以為牢脈故或有革無牢有牢無革混淆不辨革浮牢沉革虛牢實形症皆異也又牢為元氣將絶者凶牢忌陰虛失血之病為虛病見實脈也不可不辨李瀕湖曰革脈形如按鼓皮芤弦相合脈寒虛女人半産並崩漏男子榮虛或夢遺牢脈牢在沉分大而弦實浮中二候了不可得牢主堅積病在乎內左寸之牢伏梁為病右寸之牢息賁可定左關見牢肝家血積右關見牢陰寒痞癖左尺牢形奔豚為患右尺牢形疝瘕痛甚蕭通隱曰牢實相類牢脈沉而有力動而不移主陰寒凝固之象也若實脈則浮沉皆得大而且長指下鼓擊息數往來動而能移乃主陽盛實熱之病脈體固依稀相似而主病則已懸甚均一動也只爭移與不移此徐東皋獨得牢脈之神識超千古矣及閲方書謂潔古實脈而投薑附此必非實脈乃牢脈也不容不細別之李瀕湖曰牢則寒深里有餘腹心隱痛木乘脾疝㿗癥瘕何愁也失血陰虛卻忌之散脈散脈浮亂有表無里中候漸空按則絶矣散為本傷見則危殆左寸之散怔忡不寐右寸之散自汗淋漓左關之散當有溢飲右關之散脹滿蟲疾居於左尺北方水竭右尺得之陽衰命絶蕭通隱曰芤虛散不同虛脈遲大而軟按之無有隱指豁豁然而空崔紫虛云形大力薄其虛可知主傷暑怔忡自汗驚悸發熱陰虛腹脹痿痹遺精便泄諸症經曰血虛脈虛又曰氣來虛微為不及病在內又曰久病脈虛者死若芤脈則大如慈蔥與虛脈豁豁然空不同也所謂散脈者其形如楊花散漫去來無定息數難齊無統紀無約束渙散不收稍按則四散不聚主病為溢飲為血耗為怔忡為脫汗為胻腫胕産婦得之生妊婦得之墜平人見之死難經曰散脈獨見者危柳氏曰散為血氣俱虛根本脫離之脈若兩尺見之魂斷歸冥心脈洪大微散肺脈浮澀微散獨此不妨耳此散與虛異而虛又與芤異也李瀕湖曰左寸怔忡右寸汗溢飲左關應軟散右關軟散脹腫胕散居兩尺魂應斷無根本故也芤脈芤乃草名絶類慈蔥浮沉俱有中候獨空芤脈中空故主失血左寸呈芤心主喪血右寸呈芤相傳陰傷芤入左關肝血不藏花現右關脾血不攝左尺如芤火炎精漏右尺如芤便紅為咎張景嶽曰芤脈浮大中空按如蔥管芤為陽脈凡浮豁弦洪之屬皆相類也為孤陽脫陰之候為失血脫血為氣無所歸為陽無所附為陰虛發熱為頭暈目眩為驚悸怔忡為喘急盜汗芤雖陽脈而陽實無根陰虛而陽無所附總屬大虛之候蕭通隱曰芤革不同芤形大如慈蔥浮沉有中央空同父曰營行脈中脈以血為形芤脈中空脫血之象也革脈則形按如鼓皮雖體不同大抵主病則皆失血亡陰之症李瀕湖曰寸芤積血在胸中關內逢之腸里癰尺部見芤多下血赤淋紅痢漏崩中伏脈伏為隱伏更下於沉推筋著骨始得其形伏脈為陰受病入深伏犯左寸血鬱之症伏居右寸氣鬱之疴左關值伏肝血在腹右關值伏寒凝水穀左尺伏見疝瘕可驗右尺伏藏少火消亡張景嶽曰伏脈如有如無附骨乃見此陰陽潛伏阻隔閉塞之候或火閉而伏或寒閉而伏或氣閉而伏為痛極為霍亂為疝瘕為閉結為氣逆為食滯為忿怒為厥逆水氣凡伏脈之見雖與沉微細脫者相類而實有不同也蓋脈之伏者以其本有如無而一時隱蔽不見耳此有胸腹痛劇而伏者有氣逆於經脈道不通而伏者有偶因氣脫不相接續而伏者然此必暴病暴逆者乃有之調其氣而脈自復矣若此數種之外其有積困延綿脈本細微而漸至隱伏者此乃殘燼將絶之兆安得尚有所伏常見庸人診此無論久暫虛實動稱伏脈而破氣導痰等劑猶然任意此恐就道稽遲而復行催牒耳聞見略具諒不至此蕭通隱曰伏脈深於沉診須推筋著骨細尋方見主寒凝經絡臟腑或霍亂吐瀉腹疼沉困或宿食沉蓄或老痰膠固或厥逆重陰散寒溫里急宜著力傷寒太陽初症得此最為吉兆故瀕湖曰傷寒一手脈伏曰單伏兩手脈伏曰雙伏不可以陽症見陰為診乃火邪內郁不得發越陽極似陰故脈伏必有大汗而解如久旱將雨六合陰晦雨後庶物皆蘇之義又有夾陰傷寒先有伏陰在內外復感寒陰盛陽衰四肢厥逆六脈沉伏須投薑附及灸關元脈乃復出也若太溪衝陽皆無脈者必死以上皆正伏脈也又有如伏之脈乃病久陰陽兩虧脈見斷續沉陷或隱或現真氣隨亡豈初病消散之比乎此乃脈脫非伏脈也至有暴驚暴怒暴厥亦見沉伏少待經盡氣復不治當自愈若人年四十以上元氣素虛忽然昏憒不省人事此為類中非真中風也喉聲曳鋸六脈沉伏惟急治以三生飲加人參一兩亦有得生者如遺尿汗泄口開目合便不救矣凡診此伏脈與如伏脈當兼察病因庶免在治李瀕湖曰伏為霍亂吐頻頻腹痛皆因宿食停蓄飲老痰成積聚散寒溫里莫因循疾脈疾為急疾數之至極七至八至脈流薄疾疾為陽極陰氣欲竭脈號離經虛魂將絶漸進漸疾旦夕殞滅左寸居疾弗戢自焚右寸居疾金被火乘左關疾也肝陰已絶右關疾也脾陰消竭左尺疾兮涸轍難濡右尺疾兮赫曦過極各病宜忌脈出馮氏錦囊脈之主病有宜不宜陰陽順逆吉凶可推中風之脈卻喜浮遲堅大急疾其凶可知傷寒熱病脈喜浮洪沉微澀小症反必凶汗後脈靜身涼則安汗後脈躁熱甚必難陽症見陰命必危殆陰症見陽雖困無害勞倦傷脾脈當虛弱自汗脈躁死不可卻瘧脈自弦弦遲則寒弦數則熱代散則難泄瀉下痢沉小滑弱實大浮數發熱則惡嘔吐反胃浮滑者昌沉數細澀結腸者亡霍亂之候代脈勿訝舌卷囊縮厥伏可嗟嗽脈多浮浮濡易治沉伏而緊死期將至喘息抬肩浮滑是順沉澀肢寒切為逆症火熱之病洪數為宜微弱無神根本脫離骨蒸發熱脈數而虛熱而澀小必殞其軀勞極諸虛浮軟微弱土敗雙弦火炎細數失血諸症脈必見芤緩小可喜數大堪憂蓄血在中牢大卻宜沉澀而微速愈者稀三消之脈數大者生細微短澀應手堪驚小便淋閉鼻色必黃實大可喜澀小知亡癲乃重陰狂乃重陽浮洪吉象沉急凶殃癇乃浮緩沉小急實但弦無胃必死不失心腹之痛其類有九細遲速愈浮大延久疝屬肝病脈必弦急牢急者生弱急者死黃疸濕熱洪數便宜不妨浮大微澀難醫腫脹之脈浮大洪實細而沉微岐黃無術五藏為積六腑為聚實強可生沉細難愈中惡腹脹緊細乃生浮大何如邪氣已深鬼祟之脈左右不齊乍大乍小乍數乍遲癰疽未潰洪大脈宜及其已潰洪大最忌肺癰之成寸數而實肺痿之症數而無力癰痿色白脈宜短澀數大相逢氣損血失腸癰實熱滑數相宜沉細無根其死可期脈要歌從權輿改正脈有三部部有三候逐部先尋次宜總究左寸心經火位脈宜流利洪強左關肝膽弦而且長尺部膀胱沉靜彌良右寸肺金之主輕浮充暢為宗脾胃居於關部和緩胃氣常充右尺三焦連命沉滑而實則隆四時相代脈狀靡同秋微毛而冬石春則弦而夏洪滑而微浮者肺恙弦中兼細者脾殃心病則血衰脈小肝證則脈弦且長大而兼緊腎疾奚康寸口多弦頭面何曾舒泰關前若緊胸中定是癥殃急則風上攻而頭痛緩則皮頑痹而不昌微是厥逆之陰數為虧損之陽滑則痰涎而胸膈氣壅澀緣血少而背膊疼傷沉是背心之氣洪乃胸脅之妨若夫關中緩則飲食必少滑實胃火煎熬小弱畏寒逆冷細微食少膨脹衛之虛者澀候氣之滯者沉當左關微澀兮血少右關弦急兮過勞洪實者血結之瘀遲緊者脾冷之殃至於尺內洪大則陰虛可憑或微或澀便濁遺精弦者腹痛伏者食停滑兮小腹急脹婦則病在月經澀兮嘔逆翻胃弦強陰疝血崩緊兮小腹作痛沉微必主腰疼緊促形於寸此氣滿於心胸緊弦見於關斯痛攻乎腹脅兩寸滑數兮嘔逆上奔兩關滑數兮蛔蟲內齧心胸留飲寸口沉潛臍腹成癥關中促結左關弦緊兮緣筋脈之拘攣右關沉滑兮因食積之作孽死脈歌出權輿雀啄連來三五啄屋漏半日一點落魚翔似有又如無蝦遊靜中忽一躍彈石硬來尋即散搭指散亂為解索寄語醫家仔細看六脈一見休下藥矯世惑脈辨汪石山夫脈者本乎營與衛也而營行於脈之中衛行於脈之外苟臟腑和平營衛調暢則脈無形狀之可議矣或者六淫外襲七情內傷則臟腑不和營衛乖謬而二十四脈之名狀層出而疊見矣是故風寒暑濕燥火此六淫也外傷六淫之脈則浮為風緊為寒虛為暑細為濕數為燥洪為火此皆可以脈而別其外感之邪也喜怒憂思悲恐驚者此七情也內傷七情之脈喜則傷心而脈緩怒則傷肝而脈急恐則傷腎而脈沉悲則氣消而脈短驚則氣亂而脈動此皆可以脈而辨其內傷之病也然此特舉其常而以脈病相應者為言也若論其變則有脈不應病病不應脈變出百端而難一一盡憑乎脈者矣試舉一二言之如張仲景云脈浮大邪在表為可汗若脈浮大心下鞕有脈屬臟者攻之不令發汗此又非浮為表邪可汗之脈也又云促脈為陽盛宜用葛根黃芩黃連湯若脈促厥冷為虛脫非灸非溫不可此又非促為陽盛之脈也又曰遲脈為寒沉脈為里若陽明脈遲不惡寒身體濈濈汗出則用大承氣此又非諸遲為寒之脈矣少陰病始得之反發熱而脈沉宜麻黃附子細辛湯汗之此又非沉為在裡之脈矣凡此皆脈難盡憑之明驗也若只憑脈而不問證未免以寒為熱以表為里以陰為陽顛倒錯亂而夭人壽者多矣是以古人治病不專於脈而必兼於審證良有以也奈何世人不明乎此往往有病諱而不言惟以診脈而試醫之能否脈之而所言偶中便視為良醫而傾心付託其於病之根源一無所告藥之宜否亦無所審惟束手聽命於醫因循遂至於死尚亦不悟深可悲矣彼庸俗之人素不嗜學固無足怪奈近世士大夫家亦未免狃於此習是又大可笑也夫定靜安慮格物致知乃大學首章第一義而慮者謂慮事精詳格物者謂窮致事物之理致知者謂推及吾之所知凡此數事學者必嘗究心於此矣先正又言為人子者不可不知醫病臥於床委之庸醫比之不慈不孝夫望聞問切醫家大節目也苟臨病之際惟以切而知之為能其餘三事一切置而不講豈得謂知醫乎豈得為處事精詳乎豈得為窮致事物之理而惟極吾之所知乎且醫之良亦不專於善診一節凡動靜有常舉止不妄存心忠厚發言純篤察病詳審處方精專兼此數者庶可謂之良矣雖據脈言證或有少差然一脈所主非一病故所言未必盡中也若以此而遂棄之所謂以二卵而棄干城之將烏可與智者道哉姑以浮脈言之脈經云浮為風為虛為氣為嘔為厥為痞為脹為滿為不食為熱為內結等類所主不下數十餘病假使診得浮脈彼將斷其為何病耶苟不兼之以望聞問而欲的知其為何病吾謂戛戛乎其難矣古人以切居望聞問之後則於望聞問之間已得其病情矣不過再診其脈看病應與不應也若脈與病應則吉而易醫脈與病反則凶而難治以脈參病意蓋如此曷以診脈知病為貴哉夫脈經一書拳拳示人以診法而開卷入首便言觀形察色彼此參伍以決死生可見望聞問切醫之不可缺一也噫世稱善脈莫過叔和尚有待於彼此參伍況下於叔和者乎故專以切脈言病必不能不致於誤也安得為醫之良抑不特此世人又有以太素脈而言人貴賤窮通者此又妄之甚也豫嘗考其義矣夫太者始也初也如太極太乙之太素者質也本也如繪事後素之素此蓋言始初本質之脈也破的語此果何脈耶則必指元氣而言也東垣曰元氣者胃氣之別名胃氣之脈蔡西山所謂不長不短不疏不數不大不小應手沖和意思欣欣難以名狀者是也無病之人皆得此脈以此脈而察人之有病無病則可以此脈而察人之富貴貧賤則不可何也胃氣之脈難以形容莫能名狀將何以為貴賤窮通之診乎竊觀其書名雖太素而其中論述略無一言及於太素之義所作歌括率多俚語全無理趣原其初意不過托此以為徼利之媒後世不察遂相傳習莫有能辨其非者又或為之語曰太素云者指貴賤窮通稟於有生之初而言也然脈可以察而知之非謂脈名太素也豫曰固也然則太素之所診者必不出於二十四脈之外矣夫二十四脈皆主病言一脈見則主一病貧賤富貴何從而察之哉假如浮脈其診為風使太素家診之將言其為風耶抑言其為貴賤窮通耶二者不可得兼若言其為風則其所知亦不過病也若遺其病而言其為貴賤窮通則是近而病諸身者尚不能知安得謂之太素則遠而違諸身者必不能知之也蓋貴賤窮通身外之事與身之血氣了不相干安得以脈而知之乎況脈之變見無常是以今日診得是脈明日診之而或非春間診得是脈至夏按之而或否彼太素者以片時之尋按而斷一生之休咎殆必無是理然縱使億則屢中亦是捕風捉影倣佛形容安有一定之見哉噫以脈察病尚不知病之的而猶待乎望聞問況能知其他乎且脈兆於岐黃演於秦越而詳於叔和遍考素難脈經並無一字言及此者非隱之也殆必有不可誣者耳巢氏曰太素者善於相法特假太素以神其術耳誠哉言也足以破天下後世之惑矣又有善伺察者以言甜人陰得其實故於診按之際肆言而為欺妄是又下此一等無足論也雖然人稟天地之氣以生不能無清濁純駁之殊稟之清者血氣清而脈來亦清清則脈形圓淨至數分明吾診乎此但知其主富貴而已若曰何年登科何年升授何年招財何年得子吾皆不得而知矣稟之濁者血氣濁而脈來亦濁濁則脈形不清至數混亂吾診乎此但知其主貧賤而已若曰某時招財某時破財某時損妻某時克子吾亦莫得而知矣又有形濁而脈清者此謂濁中之清質清而脈濁者此謂清中之濁又有形不甚清脈不甚濁但浮沉各得其位大小不失其等亦主平穩而無大得喪也其他言有所未盡義有所未備學者可以類推是則吾之所謂知人者一本於理而已矣豈敢妄為之説以欺人哉噫豫所以著為是論者蓋以世之有言太素脈者靡不翕然稱美不惟不能以理析又從而延譽於人縱使其言有謬又必陰與之委曲影射此所謂誤己而誤人者也果何益之有哉又有迎醫服藥者不惟不先言其所苦甚至再三詢叩終於默默至有隱疾而困醫者醫固為其所困不思身亦為醫所困矣此皆世之通患人所共有故豫不得不詳論之以致夫丁寧之意俾聾瞽者或有所開發焉孟子曰豫豈好辨哉豫不得已也妊娠脈婦人之脈以血為本血旺易胎氣旺難孕少陰動甚謂之有子尺脈滑利妊娠可喜滑疾不散胎必三月但疾不散五月可別左疾為男右疾為女女腹如箕男腹如釜欲産之脈其至離經水下乃産未下勿驚新産之脈緩滑為吉實大弦牢有證則逆天和脈參後六十年運氣診治出軒岐究政天和脈只論三陰南天高兮北泉深太陰專主右尺寸厥陰尺寸左邊沉少陰尺寸兩不應相交相反死相臨天和乃平脈也諸陽為浮諸陰為沉故不言三陽司天在泉南政以天道言甲己二歲論脈則寸在南而尺在北三陰司天則兩寸不應太陰司天右寸不應少陰司天兩寸不應厥陰司天左寸不應三陰在泉則兩尺不應太陰在泉右尺不應少陰在泉兩尺不應厥陰在泉左尺不應北政以地道言乙丙丁戊庚辛壬癸之歲論脈則寸在北而尺在南三陰司天則兩尺不應太陰司天右尺不應少陰司天兩尺不應厥陰司天左尺不應三陰在泉則兩寸不應太陰在泉右寸不應少陰在泉兩寸不應厥陰在泉右寸不應不應者皆為沉脈也紺珠經曰五行君火不用事故南政少陰司天君火在上則兩寸不應司泉君火在下則兩尺不應厥陰司天君火在左故左寸不應司泉則左尺不應太陰司天君火在右故右寸不應司泉則右尺不應北政少陰司天君火在上則兩尺不應司泉君火在下則兩寸不應厥陰司天君火在左故左尺不應司泉則左寸不應太陰司天君火在右故右尺不應司泉則右寸不應凡不應者謂脈沉而細不應於手也反之則沉為浮細為大也歲當君火在寸而沉反見於尺歲當君火在寸而沉反見於尺歲當君火在尺而沉反應於寸經曰尺寸反者死歲當君火在左而沉反見於右歲當君火在右而沉反見於左經曰陰陽交者死又曰學診之士必先歲氣良有以哉李南豐云上與仲景丹溪所説不同然所論深得素問君火以退之旨故從之素問六十年運氣病治之紀壬辰壬戌歲上太陽司天中木運太下太陰在泉其化上苦溫中酸和下甘溫藥食宜也主病眩掉瞑戊辰戊戌歲上太陽司天中火運太下大陰在泉其化上苦溫中甘和下甘溫藥食宜也主病熱鬱甲辰甲戌歲上太陽司天中土運太下太陰在泉其化上苦熱中苦溫下苦溫藥食宜也主病濕下重庚辰庚戌歲上太陽司天中金運太下太陰在泉其化上苦熱中辛溫下甘熱藥食宜也主病燥悶滿丙辰丙戌歲上太陽司天中水運太下太陰在泉其化上苦熱中鹹溫下甘熱藥食宜也主病大寒凡此太陽司天之政氣化運行先天此下總結辰戌年太陽司天六氣之化也凡子寅辰午申戌六陽年皆為太過醜戌酉未己卯六陰年皆為不及太過之氣常先天時而至故其所生長收藏氣化運行皆早不及之氣常後天時而至故其氣運行皆遲如氣交變大論曰太過者先天不及者後天本篇後文曰運太過則其至先運不及則其至後皆此義也丁卯丁酉歲上陽明司天中木運少下少陰在泉其化上苦小溫中辛和下鹹寒藥食宜也主災三宮癸卯癸酉歲上陽明司天中火運少下少陰在泉其化上苦小溫中鹹溫下鹹寒藥食宜也主災九宮己卯己酉歲上陽明司天中土運少下少陰在泉其化上苦小溫中甘和下鹹寒藥食宜也主災五宮乙卯乙酉歲上陽明司天中金運少下少陰在泉其化上苦小溫中苦和下鹹寒藥食宜也主災七宮辛卯辛酉歲上陽明司天中水運少下少陰在泉其化上苦小溫中苦和下鹹寒藥食宜也主災一宮凡此陽明司天之政氣化運行後天此總言卯西年陽明司天六氣之化也凡此卯酉十年歲氣不足故氣化運行後天壬寅壬申歲上少陽司天中木運太下厥陰在泉其化上鹹寒中酸和下辛涼藥食宜也病掉眩支脅驚駭戊寅戊申歲上少陽司天中火運太下厥陰在泉其化上鹹寒中甘和下辛涼藥食宜也病上熱鬱血溢泄心痛甲寅甲申歲上少陽司天中土運太下厥陰在泉其化上鹹寒中咸和下辛涼藥食宜也病體重胕痞飲庚寅庚申歲上少陽司天中金運太下厥陰在泉其化上鹹寒中辛溫下辛涼藥食宜也病肩背胸中丙寅丙申歲上少陽司天中水運太下厥陰在泉其化上鹹寒中鹹溫下辛溫藥食宜也病寒浮腫凡此少陽司天之政氣化運行先天丁丑丁未歲上太陰司天中木運少下太陽在泉其化上苦溫中辛溫下甘熱藥食宜也主災三宮癸丑癸未歲上太陰司天中火運少下太陽在泉其化上苦溫中鹹溫下甘熱藥食宜也主災九宮己丑己未歲上太陰司天中土運少下太陽在泉其化上苦熱中甘和下甘熱藥食宜也主災五宮乙丑乙未歲上太陰司天中金運少下太陽在泉其化上苦熱中酸和下甘熱藥食宜也主災七宮辛丑辛未歲上太陰司天中水運少下太陽在泉其化上苦熱中苦和下苦熱藥食宜也主災一宮凡此太陰司天之政氣化運行後天壬子壬午歲上少陰司天中木運太下陽明在泉其化上鹹寒中酸涼下酸溫藥食宜也主病支滿戊子戊午歲上少陰司天中火運太下陽明在泉其化上鹹寒中甘寒下酸溫藥食宜也主病血溢上熱甲子甲午歲上少陰司天中土運太下陽明在泉其化上鹹寒中苦熱下酸熱藥食宜也病中滿身重庚子庚午歲上少陰司天中金運太下陽明在泉其化上鹹寒中辛溫下鹹溫藥食宜也主病下清丙子丙午歲上少陰司天中水運太下陽明在泉其化上鹹寒中咸熱下酸溫藥食宜也主病寒下凡此少陰司天之政氣化運行先天丁巳丁亥歲上厥陰司天中木運少下少陽在泉其化上辛涼中辛和下鹹寒藥食宜也主災三宮癸巳癸亥歲上厥陰司天中火運少下少陽在泉其化上辛涼中咸和下鹹寒藥食宜也主災九宮己巳己亥歲上厥陰司天中土運少下少陽在泉其化上辛涼中甘和下鹹寒藥食宜也主災五宮乙巳乙亥歲上厥陰司天中金運少下少陽在泉其化上辛涼中酸和下鹹寒藥食宜也主災七宮辛巳辛亥歲上厥陰司天中水運少下少陽在泉其化上辛涼中苦和下鹹寒藥食宜也主災一宮凡此厥陰司天之政氣化運行後天愚按人秉天地之氣以生天人一理也五運六氣陰陽之變勝復之作而人身應之經曰隨其氣所在期於左右從其氣則和違其氣則病迭移其位者病失守其位者危寸尺反者死陰陽交者死又曰先立其年以知其氣而主病之陰陽虛實逆從生死毋外此以為氣診矣奇經八脈出軒岐究政李瀕湖曰凡人一身有經脈絡脈直行曰經旁行曰絡經凡十二手之三陰三陽足之三陰三陽是也絡凡十五乃十二經各有一別絡而脾又有一大絡並任督二絡為十五也共二十七氣相隨上下如泉之流如日月之行不得休息故陰脈營於五臟陽脈營六腑陰陽相貫如環無端莫知其紀終而復始其流溢之氣入於奇經轉相灌溉內溫臟腑外濡腠理奇經凡八脈不拘制於十二正經無表裡配合故謂之奇蓋正經猶乎溝渠奇經猶夫湖澤正經之脈隆盛則溢於奇經故越人比之天雨降下溝渠溢滿滂沛妄行流於湖澤此發靈素未發之祕者也八脈載在群書略而不悉醫不知此罔探病機仙不知此難安爐鼎云奇經八脈者陰維也陽維也陰蹺也陽蹺也沖也任也督也帶也陽維起於諸陽之會由外踝而上行於衛分陰維起於諸陰之交由內踝而上行於營分所以為一身之綱維也陽蹺起於跟中循外踝上行於身之左右陰蹺起於跟中循內踝上行於身之左右所以使機關之捷蹺也督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海任脈起於會陰循腹而行於身之前為陰脈之承任故曰陰脈之海衝脈起於會陰夾臍而行直衝於上為諸脈之衝要故曰十二經脈之海帶脈則橫圍於腰狀如束帶所以總約諸脈者也是故陽維主一身之表陰維主一身之裡以乾坤言也陽蹺主一身左右之陽陰蹺主一身左右之陰以東西言也督主身後之陽任沖主身前之陰以南北言也帶脈橫束諸脈以六合言也是故醫而知乎八脈則十二經十五絡之大旨得矣仙而知乎八脈則龍虎升降玄牝幽微之妙竅得矣兩手脈浮之俱有陽沉之俱有陰陰陽皆實盛者此為沖督之脈也沖督之脈者十二經之道路也沖督用事則十二經不復朝於寸口其人皆恍惚狐疑不省必當猶豫而兩心也兩手陽脈浮而細微綿綿不可知俱有陰脈亦復細綿綿此為陰蹺陽蹺之脈也此人曾有病鬼魅風死若恍惚亡人為禍也尺寸脈俱浮直上直下此為督脈腰背強直不得俯仰大人顛病小兒風癇疾尺寸脈俱牢直上直下此為衝脈胸中有病寒疝也難經曰奇經為病何如然陽維維於陽陰維維於陰陰陽不能相維則悵然失志溶溶不能自收陰蹺為病陽緩而陰急陽蹺為病陰緩而陽急衝脈為病逆氣而裡急督脈為病脊強而厥任脈之為病其內若結男子為七疝女子為瘕聚帶之為病腹滿腰溶溶若坐水中陽維為病苦寒熱陰維為病苦心痛此奇經脈之為病也舉脈訣悖經之非出軒岐究政蕭通隱曰宋妄男子高陽生者冒竊叔和偽創脈訣庸鄙差謬大乖經旨俗醫習誦遵為法程終日咕譁益增聾聵雖閲多病歷多壽虛實不識生死無知脈理竟昧誤世非淺獨奈相承膠固難拔若肯回心翻悟棄邪歸正依憑內經脈經正法特究虛實洞明生死病必識脈治必求本軒岐微蘊再彰今日天下之幸萬世之慶也今舉其非者於後脈經以浮脈謂舉之有餘按之不足脈訣乃謂尋之如太過據此乃浮兼洪緊實之象豈浮之體乎謬一也又脈經以沉脈謂重按至筋骨乃得脈訣乃謂緩度三關狀如爛綿豈知沉尚兼遲數洪細而誤指爛綿之弱脈為沉之體謬二也又脈經以遲脈謂一息三至去來極慢脈訣乃為重手乃得又曰隱隱曰狀且難是又混遲而為沉為澀矣豈遲之體乎謬三也又脈經以數為綱領正脈脈訣妄立七表八里名目而遺數脈只歌於九道謬四也又脈經以滑脈往來流利如珠應指脈訣乃云按之即伏三關如珠不進不退此正內經所云皮膚著脈不往來者死是豈滑之體乎謬五也又脈經以澀脈為往來難細遲短散脈訣乃云指下尋之似有舉之全無悖經甚矣謬六也又脈經以虛脈為遲大而軟按之無力隱指豁豁然空脈訣乃謂尋之不足舉之有餘此為浮脈豈虛之體乎謬七也又脈經以實脈為浮沉皆得愊愊應指脈訣乃言如繩應指來又言證為小便不禁是認脈為緊脈而證為虛寒之證妄甚矣謬八也又脈經以洪脈為指下極大宜於夏脈訣乃云季夏宜之秋季冬季發汗通腸俱非所宜獨不聞有舍時從證乎謬九也又脈經以緊脈為數如切繩脈訣乃云寥寥入尸來是令脈將倒行耳謬十也又脈經以芤脈中央空兩邊實病主失血脈訣乃謂兩頭有中間無是脈從中而斷截矣又言主淋瀝氣入小腸與血症何反誤世不小謬十一也又脈經以緩脈主營弱風虛濕脾之病脈訣乃云為脾熱口臭反胃齒痛夢鬼之症支離枉誕謬十二也又脈經以弦脈如張弓弦脈訣乃云脈緊狀繩牽時時帶數此又混緊數為弦大失弦體矣謬十三也又脈經以牢脈似伏實大而長微弦脈訣乃云尋之則無按之則有又云脈入皮膚辨息難又以牢為死脈皆舛妄害理謬十四也又脈經以濡脈極軟而浮細如綿按之無有脈訣乃云按之似有舉還無是又以微脈為濡謬十五也又脈經以弱脈為極軟而沉細按之乃得舉之無有脈訣乃言輕手乃得是又以濡為弱謬十六也又脈經以細脈小於微而常有細直而軟脈訣乃謂往來極微與經大乖謬十七也又脈經以伏脈為重按著骨指下才動而脈訣乃云尋之似有定息全無謬十八也又脈經以動脈為見於關上下厥厥動搖脈訣乃言尋之似有舉之還無不離其處不往不來三關沉沉含糊譫妄謬十九也又脈經以促脈為來去數時一止復來脈訣乃云並居寸口不言時止謬二十也又脈經以結脈為往來緩時一止復來脈訣乃云或來或去聚而卻還此與結何干謬二十一也又脈經與仲景以動為陽脈訣之九道則以動為陰謬二十二也又仲景以弦為陰脈訣之七表則以弦為陽謬二十三也又內經難經仲景脈經皆以脈從陰陽對待而言而脈訣則妄創七表八里九道之詭名夫以表言之則實脈非表也以裡言之則遲脈非里也而道更不知為何道也謬二十四也以上二十四謬舉世習熟無有覺其非者茲特以經為案以悖經為斷切有賴於同志之士焉謹再考證諸書以悉其謬晦庵朱夫子曰古人察脈非一道今世惟守寸關尺之法俗傳脈訣辭最鄙淺非叔和本書東楊柳貫曰王叔和撰脈經十卷為醫家一經今脈訣熟在人口直謂叔和所作不知叔和西晉時尚未有歌括此乃宋之中世人假託以便習肄爾河東王世相曰診候之法不易精也軒岐微蘊越人叔和撰難經脈經猶未盡泄其奧五代高陽生著脈訣假叔和之名語多抵牾辭語鄙俚又被俗學妄注世醫家傳戶誦茫然無所下手不過藉此求食而已於診視何益哉云間淺溥曰晉太醫令王叔和著脈經其言可守而不可變乃托叔和脈訣行而醫經之理遂微蓋叔和為世所信重故假其名而得行耳然醫道之日淺未必不繫此而衰之也櫻寧滑壽曰脈之陰陽表裡以對待而為名象也高陽生七表八里九道蓋鑿鑿也求脈之明為脈之晦金陵戴起宗曰脈不可以表裡定名也軒岐越人叔和皆不言表裡脈訣竊叔和之名而立七表八里九道為世大惑脈之變化從陰陽生但可以陰陽對待而言各從其類豈可以一浮二芤為定序而分七八九之名乎大抵因浮而見皆為表因沉而見者皆為里何拘於七八九哉廬山劉立之以浮沉遲數為綱以教學者雖似捷徑然必由博反約然後能入脈妙若以此自足亦畫矣朱丹溪曰氣口者脈之要會故能知人命之死生世之俗醫誦高陽生之妄作欲以治病其不殺人也幾希跋先太父自應童試及習舉子業風簷辛苦備嘗之矣然屢躓場屋自訂香楓書屋詩稿一卷詩選一卷歲乙丑隨任云間得腸澼症嗣是邃心醫學嘗謂醫家首重切脈猶作文首貴認題所著醫方纂要一卷醫燈四卷即行付梓而是書纂各家脈訣參以己見於己
